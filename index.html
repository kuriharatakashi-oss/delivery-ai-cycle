<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配送AI駆動改善サイクル</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:#f0f0ec;color:#1a1a18;font-size:15px}
:root{
  --bg:#ffffff;--bg2:#f0f0ec;--bg3:#e4e2db;
  --t1:#1a1a18;--t2:#5f5e5a;--t3:#909088;
  --bl:#rgba(0,0,0,0.1);--bm:rgba(0,0,0,0.18);
  --r:8px;--rl:12px;
  --blue:#185FA5;--blue-l:#E6F1FB;--blue-b:#B5D4F4;--blue-d:#0C447C;
  --green:#3B6D11;--green-l:#EAF3DE;
  --red:#A32D2D;--red-l:#FCEBEB;--red-b:#F7C1C1;
  --amber:#854F0B;--amber-l:#FAEEDA;--amber-b:#FAC775;
}
@media(prefers-color-scheme:dark){:root{--bg:#1e1e1c;--bg2:#272725;--bg3:#313130;--t1:#e8e8e4;--t2:#a0a09a;--t3:#666660;--bl:rgba(255,255,255,0.09);--bm:rgba(255,255,255,0.16)}}
/* layout */
.app{min-height:100vh;background:var(--bg2)}
.topbar{background:var(--bg);border-bottom:1px solid var(--bl);padding:0 32px;display:flex;align-items:stretch;position:sticky;top:0;z-index:200;height:56px}
.topbar-brand{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:600;color:var(--t1);padding-right:24px;border-right:1px solid var(--bl)}
.step-nav{display:flex;align-items:stretch;flex:1;overflow-x:auto}
.step-btn{padding:0 20px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--t2);border-bottom:2px solid transparent;display:flex;align-items:center;gap:7px;white-space:nowrap;transition:all 0.15s}
.step-btn:hover{color:var(--t1)}
.step-btn.active{color:var(--blue);border-bottom:2px solid var(--blue)}
.step-num{width:19px;height:19px;border-radius:50%;background:var(--bg3);font-size:10px;display:flex;align-items:center;justify-content:center;color:var(--t2);flex-shrink:0}
.step-btn.active .step-num{background:var(--blue);color:#fff}
.topbar-right{display:flex;align-items:center;gap:10px;padding-left:20px;border-left:1px solid var(--bl);margin-left:auto}

/* search bar */
.search-bar{background:var(--bg);border-bottom:1px solid var(--bl);padding:14px 32px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.search-label{font-size:13px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.search-select{font-size:15px;font-weight:600;padding:8px 14px;border-radius:var(--r);background:var(--bg2);border:1.5px solid var(--bm);color:var(--t1);cursor:pointer;outline:none;min-width:160px}
.search-select:focus{border-color:var(--blue)}
.search-divider{width:1px;height:28px;background:var(--bl)}
.kpi-strip{display:flex;gap:10px;margin-left:auto;flex-wrap:wrap}
.kpi-chip{background:var(--bg2);border-radius:var(--r);padding:6px 14px;display:flex;flex-direction:column;align-items:center;min-width:100px}
.kpi-chip-label{font-size:10px;color:var(--t2);font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.kpi-chip-val{font-size:18px;font-weight:700;margin-top:1px}

/* content */
.content{padding:20px 32px;max-width:1800px;margin:0 auto}
.two-col{display:grid;grid-template-columns:1.1fr 0.9fr;gap:16px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}
.panel{background:var(--bg);border:1px solid var(--bl);border-radius:var(--rl);padding:18px 20px;margin-bottom:16px}
.panel-title{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.section-hidden{display:none}

/* alert strip */
.alert-strip{background:var(--red-l);border:1px solid var(--red-b);border-radius:var(--r);padding:10px 16px;font-size:13px;color:var(--red);display:flex;align-items:center;gap:8px;margin-bottom:14px;font-weight:500}

/* vehicle table */
.veh-wrap{overflow-x:auto}
.veh-table{width:100%;border-collapse:collapse;font-size:13px}
.veh-table th{padding:8px 10px;border-bottom:1px solid var(--bl);color:var(--t2);font-weight:600;text-align:left;background:var(--bg2);white-space:nowrap;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
.veh-table td{padding:9px 10px;border-bottom:1px solid var(--bl);color:var(--t1);white-space:nowrap}
.veh-table tr.selected td{background:var(--blue-l) !important}
.veh-table tr:hover td{background:var(--bg2);cursor:pointer}
.status-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600}
.s-high{background:var(--red-l);color:var(--red)}
.s-mid{background:var(--amber-l);color:var(--amber)}
.s-ok{background:var(--green-l);color:var(--green)}
.s-icon{font-size:13px}

/* right panel */
.right-panel-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;color:var(--t3);font-size:13px;gap:8px}
.ai-comment{background:var(--blue-l);border:1px solid var(--blue-b);border-radius:var(--r);padding:14px 16px;margin-bottom:12px}
.ai-comment-title{font-size:11px;font-weight:700;color:var(--blue-d);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.ai-comment-body{font-size:13px;color:var(--blue);line-height:1.7}
.sim-box{border:1px solid var(--bl);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;background:var(--bg2)}
.sim-title{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:10px}
.sim-row{display:flex;justify-content:space-between;font-size:12px;color:var(--t2);margin-bottom:5px}
.sim-val{font-weight:600;color:var(--t1)}
.sim-val.positive{color:var(--green)}
.sim-val.negative{color:var(--red)}
.sim-btn{width:100%;margin-top:10px;padding:9px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:none;background:var(--blue);color:#fff;transition:background .12s}
.sim-btn:hover{background:var(--blue-d)}

/* chart canvas */
.chart-wrap{position:relative;height:180px;margin-top:4px}

/* hypo page */
.hypo-category{margin-bottom:16px}
.hypo-cat-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.hypo-card{border:1px solid var(--bl);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;background:var(--bg);cursor:pointer;transition:all .15s}
.hypo-card:hover{border-color:var(--blue);background:var(--blue-l)}
.hypo-card.hit{border-color:var(--red);background:var(--red-l)}
.hypo-card.hit .hypo-icon{color:var(--red)}
.hypo-card-header{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.hypo-icon{font-size:18px;flex-shrink:0}
.hypo-name{font-size:14px;font-weight:600;color:var(--t1);flex:1}
.hypo-body{font-size:12px;color:var(--t2);line-height:1.6;margin-left:26px}
.hypo-meter{height:6px;border-radius:99px;background:var(--bg3);margin:8px 0 4px 26px;overflow:hidden}
.hypo-meter-fill{height:100%;border-radius:99px;background:var(--red);transition:width .4s}
.hypo-meter-label{font-size:11px;color:var(--t2);margin-left:26px}

/* AP page */
.ap-modal-wrap{display:flex;align-items:flex-start;justify-content:center;padding:8px 0}
.ap-modal{background:var(--bg);border:1px solid var(--bl);border-radius:var(--rl);padding:22px 24px;width:100%;max-width:600px}
.ap-alert{background:var(--red-l);border:1px solid var(--red-b);border-radius:var(--r);padding:12px 16px;font-size:13px;color:var(--red);font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.ap-body{font-size:13px;color:var(--t2);line-height:1.7;margin-bottom:14px}
.ap-action-row{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:8px 18px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--bm);background:var(--bg);color:var(--t1);display:inline-flex;align-items:center;gap:5px;transition:background .12s}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:var(--blue-d)}
.btn-danger{background:var(--red-l);color:var(--red);border-color:var(--red-b)}
.ap-result{margin-top:12px;font-size:13px;padding:10px 14px;border-radius:var(--r)}
.reason-input{width:100%;font-size:13px;padding:9px 11px;border-radius:var(--r);border:1px solid var(--bm);background:var(--bg2);color:var(--t1);margin-top:9px;min-height:52px;resize:vertical;outline:none;font-family:inherit}
.reason-input:focus{border-color:var(--blue)}

/* action mgmt */
.ticket{border:1px solid var(--bl);border-radius:var(--r);padding:16px 18px;margin-bottom:10px;background:var(--bg)}
.ticket-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.ticket-title{font-size:14px;font-weight:600;color:var(--t1)}
.ticket-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--t2);margin-bottom:10px}
.ticket-meta span{display:flex;align-items:center;gap:4px}
.status-tag{padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700}
.st-open{background:var(--amber-l);color:var(--amber)}
.st-wip{background:var(--blue-l);color:var(--blue)}
.st-done{background:var(--green-l);color:var(--green)}
.st-over{background:var(--red-l);color:var(--red)}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg);border:1px solid var(--bl);border-radius:var(--r);padding:12px 16px;text-align:center}
.stat-val{font-size:22px;font-weight:700;color:var(--t1)}
.stat-label{font-size:11px;color:var(--t2);margin-top:3px}
.chart-wrap-sm{position:relative;height:140px}

/* constraint */
.constraint-tag{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:99px;font-size:12px;background:var(--red-l);color:var(--red);border:1px solid var(--red-b);margin:3px}
.constraint-tag .del{cursor:pointer;opacity:.6}
.constraint-tag .del:hover{opacity:1}
input[type=text]{font-size:13px;padding:8px 11px;border-radius:var(--r);border:1px solid var(--bm);background:var(--bg2);color:var(--t1);outline:none;font-family:inherit;width:100%}
input[type=text]:focus{border-color:var(--blue)}
select{font-size:13px;padding:5px 9px;border-radius:var(--r);border:1px solid var(--bm);background:var(--bg2);color:var(--t1);cursor:pointer;outline:none}

/* mobile */
@media(max-width:768px){
  .topbar{padding:0 14px;height:48px}
  .topbar-brand{font-size:14px;padding-right:12px}
  .step-btn{padding:0 12px;font-size:12px}
  .search-bar{padding:10px 14px;gap:10px}
  .search-select{font-size:14px;min-width:130px}
  .kpi-strip{gap:6px}
  .kpi-chip{min-width:80px;padding:5px 10px}
  .kpi-chip-val{font-size:15px}
  .content{padding:12px 14px}
  .two-col{grid-template-columns:1fr}
  .panel{padding:12px 14px}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .ap-action-row{flex-direction:column}
}
</style>
</head>
<body>
<div class="app">

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-brand">
    <i class="ti ti-truck" style="font-size:20px;color:var(--blue)"></i>
    配送AI改善サイクル
  </div>
  <div class="step-nav">
    <button class="step-btn active" id="tab0" onclick="showStep(0)"><span class="step-num active" id="sn0">1</span>データ分析</button>
    <button class="step-btn" id="tab1" onclick="showStep(1)"><span class="step-num" id="sn1">2</span>仮説構築</button>
    <button class="step-btn" id="tab2" onclick="showStep(2)"><span class="step-num" id="sn2">3</span>AP立案</button>
    <button class="step-btn" id="tab3" onclick="showStep(3)"><span class="step-num" id="sn3">4</span>アクション管理</button>
  </div>
  <div class="topbar-right">
    <div id="topbar-center" style="font-weight:700"></div>
    <div id="topbar-month" style="font-size:13px;color:var(--t2)"></div>
  </div>
</div>

<!-- SEARCH BAR -->
<div class="search-bar">
  <span class="search-label"><i class="ti ti-building-warehouse"></i> センター</span>
  <select class="search-select" id="centerSelect" onchange="changeCenter(this.value)">
    <option value="yashio">八潮センター</option>
    <option value="utsunomiya">宇都宮センター</option>
    <option value="omiya">大宮センター</option>
    <option value="chiba">千葉センター</option>
    <option value="kawasaki">川崎センター</option>
  </select>
  <div class="search-divider"></div>
  <span class="search-label"><i class="ti ti-calendar"></i> 年月</span>
  <select class="search-select" id="monthSelect" onchange="changeMonth(this.value)"></select>
  <div class="kpi-strip">
    <div class="kpi-chip">
      <span class="kpi-chip-label">実払コスト</span>
      <span class="kpi-chip-val" id="ks-actual" style="color:var(--t1)">-</span>
    </div>
    <div class="kpi-chip">
      <span class="kpi-chip-label">理論コスト</span>
      <span class="kpi-chip-val" id="ks-theory" style="color:var(--t1)">-</span>
    </div>
    <div class="kpi-chip">
      <span class="kpi-chip-label">乖離額</span>
      <span class="kpi-chip-val" id="ks-gap" style="color:var(--red)">-</span>
    </div>
    <div class="kpi-chip">
      <span class="kpi-chip-label">乖離率</span>
      <span class="kpi-chip-val" id="ks-rate" style="color:var(--red)">-</span>
    </div>
  </div>
</div>

<div class="content">

<!-- ===== STEP 0: データ分析 ===== -->
<div id="step0">
  <div id="alert-strip-wrap"></div>
  <div class="two-col">
    <!-- LEFT: 車両テーブル -->
    <div class="panel">
      <div class="panel-title">
        <i class="ti ti-table" style="color:var(--blue)"></i>
        車両別コスト乖離　<span style="font-size:11px;font-weight:400;color:var(--t2)">行をクリック → 詳細分析</span>
      </div>
      <div class="veh-wrap">
        <table class="veh-table">
          <thead><tr>
            <th>端末No</th><th>車格</th><th>理論コスト</th><th>稼働日数</th><th>運行時間/日</th><th>状態</th>
          </tr></thead>
          <tbody id="vehBody"></tbody>
        </table>
      </div>
    </div>

    <!-- RIGHT: AI分析パネル -->
    <div class="panel">
      <div class="panel-title">
        <i class="ti ti-brain" style="color:var(--blue)"></i>
        AI分析　<span id="selected-veh-label" style="font-size:12px;font-weight:400;color:var(--blue)"></span>
      </div>
      <div id="right-panel-content">
        <div class="right-panel-empty">
          <i class="ti ti-hand-click" style="font-size:28px"></i>
          <span>左の表から車両を選択してください</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===== STEP 1: 仮説構築 ===== -->
<div id="step1" class="section-hidden">
  <div class="two-col">
    <div class="panel">
      <div class="panel-title"><i class="ti ti-bulb" style="color:var(--blue)"></i>仮説カテゴリ診断</div>
      <div id="hypoContent"></div>
    </div>
    <div class="panel">
      <div class="panel-title"><i class="ti ti-database" style="color:var(--amber)"></i>蓄積済み制約条件</div>
      <div id="constraintList" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px"></div>
      <div style="display:flex;gap:8px">
        <input type="text" id="newConstraint" placeholder="新しい制約条件を入力…" style="flex:1">
        <button class="btn btn-primary" onclick="addConstraint()"><i class="ti ti-plus"></i> 追加</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== STEP 2: AP立案 ===== -->
<div id="step2" class="section-hidden">
  <div class="ap-modal-wrap">
    <div class="ap-modal">
      <div class="ap-alert"><i class="ti ti-alert-triangle" style="font-size:16px"></i>コスト乖離アラート：<strong id="ap-gap-disp">-</strong>　放置3日超 — エスカレーション済</div>
      <div style="font-size:15px;font-weight:600;color:var(--t1);margin-bottom:10px">AI分析結果と改善アクション提案</div>
      <div class="ap-body" id="ap-body"></div>
      <div id="ap-reason-area" style="display:none"><textarea class="reason-input" id="reasonText" placeholder="却下・保留の理由を入力してください（必須）"></textarea></div>
      <div class="ap-action-row">
        <button class="btn btn-primary" onclick="apAction('approve')"><i class="ti ti-check"></i> 承認（実行）</button>
        <button class="btn" onclick="apAction('hold')"><i class="ti ti-clock"></i> 保留（確認中）</button>
        <button class="btn btn-danger" onclick="apAction('reject')"><i class="ti ti-x"></i> 却下（理由入力）</button>
      </div>
      <div id="ap-result" style="display:none" class="ap-result"></div>
    </div>
  </div>
</div>

<!-- ===== STEP 3: アクション管理 ===== -->
<div id="step3" class="section-hidden">
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-val" id="tk-total" style="color:var(--blue)">0</div><div class="stat-label">総チケット</div></div>
    <div class="stat-card"><div class="stat-val" id="tk-open" style="color:var(--amber)">0</div><div class="stat-label">未対応</div></div>
    <div class="stat-card"><div class="stat-val" id="tk-wip" style="color:var(--blue)">0</div><div class="stat-label">対応中</div></div>
    <div class="stat-card"><div class="stat-val" id="tk-over" style="color:var(--red)">0</div><div class="stat-label">期限超過</div></div>
  </div>
  <div class="two-col">
    <div class="panel">
      <div class="panel-title"><i class="ti ti-list-check" style="color:var(--blue)"></i>チケット一覧</div>
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <select id="tk-filter" onchange="renderTickets()">
          <option value="all">すべて</option>
          <option value="open">未対応</option>
          <option value="wip">対応中</option>
          <option value="done">完了</option>
          <option value="over">期限超過</option>
        </select>
        <button class="btn btn-primary" onclick="addTicket()"><i class="ti ti-plus"></i> チケット追加</button>
      </div>
      <div id="ticketList"></div>
    </div>
    <div class="panel">
      <div class="panel-title"><i class="ti ti-chart-pie" style="color:var(--blue)"></i>ステータスサマリ</div>
      <div class="chart-wrap-sm"><canvas id="ticketChart"></canvas></div>
      <div style="margin-top:16px">
        <div class="panel-title" style="margin-bottom:10px"><i class="ti ti-brain" style="color:var(--blue)"></i>アクションFAQ蓄積</div>
        <div style="font-size:13px;color:var(--t2);line-height:1.7">対応履歴は自動的にナレッジ化され、次回のAI提案精度向上に活用されます。<br>蓄積件数：<strong id="faq-count" style="color:var(--blue)">5</strong>件　成功率：<strong style="color:var(--green)">71%</strong></div>
      </div>
    </div>
  </div>
</div>

</div><!-- /content -->
</div><!-- /app -->

<script>
// ===== DATA =====
const MONTHS = ['2025年04月','2025年05月','2025年06月','2025年07月','2025年08月','2025年09月','2025年10月','2025年11月','2025年12月','2026年01月','2026年02月','2026年03月'];

function genMonthData(baseActual, baseTheory, baseGapRate, vehicles){
  return MONTHS.map((m,i)=>{
    const noise = 0.85 + Math.random()*0.3;
    const actual = Math.round(baseActual * noise);
    const theory = Math.round(baseTheory * noise);
    const gap = actual - theory;
    return {month:m, actual, theory, gap, gapRate:Math.round(gap/theory*1000)/10, vehicles: vehicles.map(v=>({
      ...v,
      theory: Math.round(v.theory * noise),
      hours: Math.round((v.hours * (0.9+Math.random()*0.2))*10)/10,
      days: Math.max(15, Math.min(31, v.days + Math.floor(Math.random()*5-2)))
    }))};
  });
}

const CENTERS = {

function fmt(n){return n.toLocaleString()+'千円';}

function getCurrentData(){
  const arr = centerData[currentCenter];
  const idx = arr.findIndex(d=>d.month===currentMonth);
  return idx>=0 ? arr[idx] : arr[arr.length-1];
}

function populateMonthSelect(){
  const sel = document.getElementById('monthSelect');
  sel.innerHTML = MONTHS.slice().reverse().map(m=>`<option value="${m}"${m===currentMonth?' selected':''}>${m}</option>`).join('');
}

function updateSearchBar(){
  const d = getCurrentData();
  document.getElementById('ks-actual').textContent = fmt(d.actual);
  document.getElementById('ks-theory').textContent = fmt(d.theory);
  document.getElementById('ks-gap').textContent = fmt(d.gap);
  const rateEl = document.getElementById('ks-rate');
  rateEl.textContent = d.gapRate+'%';
  rateEl.style.color = d.gapRate>15 ? 'var(--red)' : d.gapRate>10 ? 'var(--amber)' : 'var(--green)';

  // alert strip
  const wrap = document.getElementById('alert-strip-wrap');
  if(d.gapRate>15){
    wrap.innerHTML=`<div class="alert-strip"><i class="ti ti-alert-triangle" style="font-size:16px"></i>乖離率 <strong>${d.gapRate}%</strong> — 要緊急対応。コスト乖離 <strong>${fmt(d.gap)}</strong> を検知しました。</div>`;
  } else if(d.gapRate>10){
    wrap.innerHTML=`<div class="alert-strip" style="background:var(--amber-l);border-color:var(--amber-b);color:var(--amber)"><i class="ti ti-alert-circle" style="font-size:16px"></i>乖離率 <strong>${d.gapRate}%</strong> — 注意レベル。継続的なモニタリングが必要です。</div>`;
  } else {
    wrap.innerHTML='';
  }
  // reflect current selections in topbar / selects
  try{
    const centerLabel = document.getElementById('topbar-center');
    const monthLabel = document.getElementById('topbar-month');
    if(centerLabel) centerLabel.textContent = CENTERS[currentCenter] ? CENTERS[currentCenter].name : currentCenter;
    if(monthLabel) monthLabel.textContent = currentMonth;
    const cs = document.getElementById('centerSelect'); if(cs) cs.value = currentCenter;
    const ms = document.getElementById('monthSelect'); if(ms) ms.value = currentMonth;
  }catch(e){console.warn('Error updating topbar labels',e)}
}

function renderVehTable(){
  const d = getCurrentData();
  document.getElementById('vehBody').innerHTML = d.vehicles.map((v,i)=>{
    const pillCls = v.status==='high'?'s-high':v.status==='mid'?'s-mid':'s-ok';
    const icon = v.status==='high'?'⚠':'ℹ';
    const pillTxt = v.status==='high'?`${icon} 要確認`:v.status==='mid'?`${icon} 注意`:'✓ 正常';
    const barW = Math.round(v.hours/15*80);
    const barCol = v.status==='high'?'var(--red)':v.status==='mid'?'var(--amber)':'var(--blue)';
    return `<tr onclick="selectVeh(${i})" id="vrow${i}">
      <td style="font-weight:700">${v.no}</td>
      <td>${v.type}</td>
      <td>${v.theory.toLocaleString()}円</td>
      <td>${v.days}日</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="width:80px;height:7px;border-radius:99px;background:var(--bg3);overflow:hidden">
            <div style="width:${barW}px;height:100%;background:${barCol};border-radius:99px"></div>
          </div>
          <span style="font-weight:600">${v.hours}h</span>
        </div>
      </td>
      <td><span class="status-pill ${pillCls}">${pillTxt}</span></td>
    </tr>`;
  }).join('');

  // re-highlight selected
  if(selectedVeh!==null){
    const row = document.getElementById('vrow'+selectedVeh);
    if(row) row.classList.add('selected');
  }
}

function selectVeh(i){
  selectedVeh = i;
  // highlight
  document.querySelectorAll('.veh-table tr').forEach(r=>r.classList.remove('selected'));
  const row = document.getElementById('vrow'+i);
  if(row) row.classList.add('selected');

  const d = getCurrentData();
  const v = d.vehicles[i];
  const base = CENTERS[currentCenter].baseVehicles[i] || CENTERS[currentCenter].baseVehicles[0];

  document.getElementById('selected-veh-label').textContent = `— ${v.no}`;

  // build daily data (30 days)
  const days = Array.from({length:30},(_,j)=>j+1);
  const dailyHours = days.map(()=>Math.round((v.hours*(0.8+Math.random()*0.4))*10)/10);
  const theoryLine = Array(30).fill(Math.round(v.hours*0.85*10)/10);

  // destroy old chart
  if(lineChart){lineChart.destroy();lineChart=null;}

  const sim = base.sim || {title:'シミュレーション',before:v.hours+'h/日',after:(v.hours*0.85).toFixed(1)+'h/日',saving:100};

  document.getElementById('right-panel-content').innerHTML = `
    <div class="ai-comment">
      <div class="ai-comment-title"><i class="ti ti-brain"></i> AI分析コメント</div>
      <div class="ai-comment-body">${base.ai || '選択された車両の分析データを取得中...'}</div>
    </div>
    <div style="margin-bottom:12px">
      <div style="font-size:12px;font-weight:600;color:var(--t2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px">日別運行時間（当月）</div>
      <div class="chart-wrap"><canvas id="lineChartCanvas"></canvas></div>
    </div>
    <div class="sim-box">
      <div class="sim-title"><i class="ti ti-sparkles" style="color:var(--blue)"></i> 最適化シミュレーション</div>
      <div style="font-size:11px;font-weight:600;color:var(--t2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px">${sim.title}</div>
      <div class="sim-row"><span>現在の運行時間</span><span class="sim-val negative">${sim.before}</span></div>
      <div class="sim-row"><span>最適化後（推定）</span><span class="sim-val positive">${sim.after}</span></div>
      <div class="sim-row"><span>月間コスト削減額（推定）</span><span class="sim-val ${sim.saving>0?'positive':''}">${sim.saving>0?'▲'+sim.saving.toLocaleString()+'千円':'±0（現状維持）'}</span></div>
      <button class="sim-btn" onclick="applySimulation('${v.no}','${sim.title}',${sim.saving})"><i class="ti ti-check"></i> このプランをAPとして採用する</button>
    </div>`;

  // draw line chart
  setTimeout(()=>{
    const ctx = document.getElementById('lineChartCanvas');
    if(!ctx) return;
    lineChart = new Chart(ctx,{
      type:'line',
      data:{
        labels: days.map(d=>d+'日'),
        datasets:[
          {label:'実績 運行時間(h)',data:dailyHours,borderColor:'#E24B4A',backgroundColor:'rgba(226,75,74,0.08)',borderWidth:2,pointRadius:2,tension:0.3},
          {label:'理論値',data:theoryLine,borderColor:'#378ADD',backgroundColor:'transparent',borderWidth:1.5,borderDash:[5,4],pointRadius:0,tension:0}
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:11},boxWidth:12}}},scales:{x:{ticks:{font:{size:10},maxTicksLimit:10}},y:{ticks:{font:{size:10}}}}}
    });
  },50);
}

  document.getElementById('ap-gap-disp').textContent = fmt(d.gap);
  document.getElementById('ap-body').innerHTML = (c.apBody||'').replace(/\n/g,'<br>');
  document.getElementById('ap-result').style.display='none';
  document.getElementById('ap-reason-area').style.display='none';
}
function apAction(type){
  const res=document.getElementById('ap-result');
  const ra=document.getElementById('ap-reason-area');
  if(type==='reject'){ra.style.display='block';res.style.display='block';res.style.background='var(--red-l)';res.style.color='var(--red)';res.textContent='却下理由を入力してください。アクションFAQに蓄積されます。';return;}
  ra.style.display='none';
  if(type==='approve'){res.style.display='block';res.style.background='var(--green-l)';res.style.color='var(--green)';res.textContent='✓ 承認しました。アクション管理にチケットが追加されました。';}
  else{res.style.display='block';res.style.background='var(--amber-l)';res.style.color='var(--amber)';res.textContent='保留中です。確認完了後に承認してください。';}
}

// ===== TICKETS =====
const STATUS_LABELS={open:'未対応',wip:'対応中',done:'完了',over:'期限超過'};
const STATUS_CLS={open:'st-open',wip:'st-wip',done:'st-done',over:'st-over'};

function renderTickets(){
  const filter = document.getElementById('tk-filter').value;
  const all = centerTickets[currentCenter] || [];
  const list = filter==='all' ? all : all.filter(t=>t.status===filter);
  document.getElementById('ticketList').innerHTML = list.map(t=>`
    <div class="ticket">
      <div class="ticket-header">
        <div class="ticket-title">${t.title}</div>
        <span class="status-tag ${STATUS_CLS[t.status]}">${STATUS_LABELS[t.status]}</span>
      </div>
      <div class="ticket-meta">
        <span><i class="ti ti-user"></i>${t.owner||'未割当'}</span>
        <span><i class="ti ti-calendar-due"></i>${t.due||'期限未設定'}</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input type="text" value="${t.next}" placeholder="ネクストアクションを入力…" style="flex:1;min-width:160px;font-size:12px;padding:6px 9px" oninput="updateTicketNext(${t.id},this.value)">
        <select style="font-size:12px" onchange="updateTicketStatus(${t.id},this.value)">
          ${Object.keys(STATUS_LABELS).map(s=>`<option value="${s}"${t.status===s?' selected':''}>${STATUS_LABELS[s]}</option>`).join('')}
        </select>
      </div>
    </div>`).join('');
  updateTicketStats();
  drawTicketChart();
}

function updateTicketStatus(id,status){
  const arr = centerTickets[currentCenter] || [];
  const t=arr.find(x=>x.id===id);
  if(t){t.status=status;renderTickets();}
}
function updateTicketNext(id,val){
  const arr = centerTickets[currentCenter] || [];
  const t=arr.find(x=>x.id===id);
  if(t) t.next=val;
}
function addTicket(){
  const arr = centerTickets[currentCenter] || (centerTickets[currentCenter]=[]);
  arr.unshift({id:Date.now(),title:'新規チケット',status:'open',owner:'',due:'',next:''});
  renderTickets();
}
function updateTicketStats(){
  const arr = centerTickets[currentCenter] || [];
  document.getElementById('tk-total').textContent=arr.length;
  document.getElementById('tk-open').textContent=arr.filter(t=>t.status==='open').length;
  document.getElementById('tk-wip').textContent=arr.filter(t=>t.status==='wip').length;
  document.getElementById('tk-over').textContent=arr.filter(t=>t.status==='over').length;
}

function drawTicketChart(){
  const ctx = document.getElementById('ticketChart');
  if(!ctx) return;
  if(ticketChart){ticketChart.destroy();ticketChart=null;}
  const arr = centerTickets[currentCenter] || [];
  const counts=[
    arr.filter(t=>t.status==='open').length,
    arr.filter(t=>t.status==='wip').length,
    arr.filter(t=>t.status==='done').length,
    arr.filter(t=>t.status==='over').length,
  ];
  ticketChart = new Chart(ctx,{
    type:'doughnut',
    data:{labels:['未対応','対応中','完了','期限超過'],datasets:[{data:counts,backgroundColor:['#FAEEDA','#E6F1FB','#EAF3DE','#FCEBEB'],borderColor:['#FAC775','#B5D4F4','#A8D177','#F7C1C1'],borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},boxWidth:12}}}}
  });
}

function showStep(n){
  for(let i=0;i<4;i++){
    document.getElementById('step'+i).classList.toggle('section-hidden',i!==n);
    document.getElementById('tab'+i).classList.toggle('active',i===n);
  }
  if(n===1) renderHypos();
  if(n===2) renderAP();
  if(n===3){renderTickets();setTimeout(drawTicketChart,50);}
}

function changeCenter(val){
  currentCenter=val;
  selectedVeh=null;
  if(lineChart){lineChart.destroy();lineChart=null;}
  updateSearchBar();
  renderVehTable();
  document.getElementById('selected-veh-label').textContent='';
  document.getElementById('right-panel-content').innerHTML=`<div class="right-panel-empty"><i class="ti ti-hand-click" style="font-size:28px"></i><span>左の表から車両を選択してください</span></div>`;
  // update other screens so they reflect the new center
  try{
    if(document.getElementById('step1') && !document.getElementById('step1').classList.contains('section-hidden')) renderHypos();
    if(document.getElementById('step2') && !document.getElementById('step2').classList.contains('section-hidden')) renderAP();
    if(document.getElementById('step3') && !document.getElementById('step3').classList.contains('section-hidden')){ renderTickets(); setTimeout(drawTicketChart,50); }
  }catch(e){console.warn('Error re-rendering screens after center change',e)}
}

function changeMonth(val){
  currentMonth=val;
  selectedVeh=null;
  if(lineChart){lineChart.destroy();lineChart=null;}
  updateSearchBar();
  renderVehTable();
  document.getElementById('selected-veh-label').textContent='';
  document.getElementById('right-panel-content').innerHTML=`<div class="right-panel-empty"><i class="ti ti-hand-click" style="font-size:28px"></i><span>左の表から車両を選択してください</span></div>`;
  // update other screens so they reflect the new month
  try{
    if(document.getElementById('step1') && !document.getElementById('step1').classList.contains('section-hidden')) renderHypos();
    if(document.getElementById('step2') && !document.getElementById('step2').classList.contains('section-hidden')) renderAP();
    if(document.getElementById('step3') && !document.getElementById('step3').classList.contains('section-hidden')){ renderTickets(); setTimeout(drawTicketChart,50); }
  }catch(e){console.warn('Error re-rendering screens after month change',e)}
}

// INIT
populateMonthSelect();
updateSearchBar();
renderVehTable();
renderConstraints();
</script>
</body>
